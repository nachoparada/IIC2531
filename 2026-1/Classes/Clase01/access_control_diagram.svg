<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Segoe UI', 'Helvetica Neue', sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1"/>
    </linearGradient>

    <!-- Host container gradient -->
    <linearGradient id="hostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.8"/>
    </linearGradient>

    <!-- Guard node gradient -->
    <linearGradient id="guardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>

    <!-- Policy node gradient -->
    <linearGradient id="policyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>

    <!-- Resource node gradient -->
    <linearGradient id="resourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>

    <!-- Log node gradient -->
    <linearGradient id="logGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>

    <!-- Principal node gradient -->
    <linearGradient id="principalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowAmber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#10b981" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#67e8f9"/>
    </marker>
    <marker id="arrowSlate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="520"/><line x1="40" y1="0" x2="40" y2="520"/>
    <line x1="80" y1="0" x2="80" y2="520"/><line x1="120" y1="0" x2="120" y2="520"/>
    <line x1="160" y1="0" x2="160" y2="520"/><line x1="200" y1="0" x2="200" y2="520"/>
    <line x1="240" y1="0" x2="240" y2="520"/><line x1="280" y1="0" x2="280" y2="520"/>
    <line x1="320" y1="0" x2="320" y2="520"/><line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="400" y1="0" x2="400" y2="520"/><line x1="440" y1="0" x2="440" y2="520"/>
    <line x1="480" y1="0" x2="480" y2="520"/><line x1="520" y1="0" x2="520" y2="520"/>
    <line x1="560" y1="0" x2="560" y2="520"/><line x1="600" y1="0" x2="600" y2="520"/>
    <line x1="640" y1="0" x2="640" y2="520"/><line x1="680" y1="0" x2="680" y2="520"/>
    <line x1="720" y1="0" x2="720" y2="520"/><line x1="760" y1="0" x2="760" y2="520"/>
    <line x1="800" y1="0" x2="800" y2="520"/>
    <line x1="0" y1="40" x2="820" y2="40"/><line x1="0" y1="80" x2="820" y2="80"/>
    <line x1="0" y1="120" x2="820" y2="120"/><line x1="0" y1="160" x2="820" y2="160"/>
    <line x1="0" y1="200" x2="820" y2="200"/><line x1="0" y1="240" x2="820" y2="240"/>
    <line x1="0" y1="280" x2="820" y2="280"/><line x1="0" y1="320" x2="820" y2="320"/>
    <line x1="0" y1="360" x2="820" y2="360"/><line x1="0" y1="400" x2="820" y2="400"/>
    <line x1="0" y1="440" x2="820" y2="440"/><line x1="0" y1="480" x2="820" y2="480"/>
  </g>

  <!-- HOST container (dashed border) -->
  <rect x="200" y="40" width="560" height="430" rx="16" fill="url(#hostGrad)" stroke="#334155" stroke-width="1.5" stroke-dasharray="8 4"/>
  <!-- Host label -->
  <text x="480" y="488" text-anchor="middle" fill="#64748b" font-size="13" font-weight="500" letter-spacing="2">HOST — AISLAMIENTO REFORZADO</text>

  <!-- ═══════════ POLÍTICA (top center) ═══════════ -->
  <rect x="380" y="70" width="200" height="64" rx="10" fill="url(#policyGrad)" filter="url(#glowPurple)" opacity="0.95"/>
  <!-- Icon: shield -->
  <g transform="translate(400, 90)" fill="none" stroke="#e0e7ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 2 L2 6 L2 12 C2 17 10 22 10 22 C10 22 18 17 18 12 L18 6 Z"/>
    <polyline points="7 12 9.5 14.5 14 10"/>
  </g>
  <text x="432" y="98" fill="#ffffff" font-size="17" font-weight="700" letter-spacing="0.5">Política</text>
  <text x="432" y="118" fill="#c7d2fe" font-size="11" font-weight="400">Reglas de acceso</text>

  <!-- ═══════════ GUARD (center) ═══════════ -->
  <rect x="380" y="210" width="200" height="70" rx="12" fill="url(#guardGrad)" filter="url(#glowAmber)"/>
  <!-- Icon: lock -->
  <g transform="translate(398, 232)" fill="none" stroke="#fffbeb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1" y="9" width="16" height="12" rx="2"/>
    <path d="M5 9 V6 C5 3 9 0.5 13 3 L13 3.5"/>
    <circle cx="9" cy="15" r="1.5" fill="#fffbeb"/>
  </g>
  <text x="430" y="250" fill="#1c1917" font-size="19" font-weight="800" letter-spacing="1">GUARD</text>
  <text x="430" y="268" fill="#451a03" font-size="11" font-weight="500">Punto de decisión</text>

  <!-- ═══════════ RECURSO (right) ═══════════ -->
  <rect x="640" y="218" width="160" height="56" rx="10" fill="url(#resourceGrad)" filter="url(#glowGreen)"/>
  <!-- Icon: database -->
  <g transform="translate(656, 234)" fill="none" stroke="#ecfdf5" stroke-width="1.8">
    <ellipse cx="9" cy="3" rx="9" ry="3"/>
    <path d="M0 3 V17 C0 19.5 4 20 9 20 C14 20 18 19.5 18 17 V3"/>
    <path d="M0 10 C0 12.5 4 13 9 13 C14 13 18 12.5 18 10"/>
  </g>
  <text x="688" y="252" fill="#ffffff" font-size="16" font-weight="700">Recurso</text>

  <!-- ═══════════ LOG AUDIT (bottom center) ═══════════ -->
  <rect x="380" y="340" width="200" height="60" rx="10" fill="url(#logGrad)" filter="url(#glowPurple)" opacity="0.9"/>
  <!-- Icon: file-text -->
  <g transform="translate(398, 356)" fill="none" stroke="#ede9fe" stroke-width="1.8" stroke-linecap="round">
    <path d="M2 2 L12 2 L18 8 L18 22 L2 22 Z"/>
    <polyline points="12 2 12 8 18 8"/>
    <line x1="6" y1="13" x2="14" y2="13"/>
    <line x1="6" y1="17" x2="11" y2="17"/>
  </g>
  <text x="432" y="375" fill="#ffffff" font-size="15" font-weight="700">Log Audit</text>
  <text x="432" y="392" fill="#ddd6fe" font-size="11">Registro de eventos</text>

  <!-- ═══════════ PRINCIPAL (left, outside host) ═══════════ -->
  <rect x="20" y="210" width="150" height="70" rx="12" fill="url(#principalGrad)" filter="url(#glowBlue)"/>
  <!-- Icon: user -->
  <g transform="translate(38, 232)" fill="none" stroke="#dbeafe" stroke-width="2" stroke-linecap="round">
    <circle cx="9" cy="6" r="5"/>
    <path d="M0 21 C0 15 4 12 9 12 C14 12 18 15 18 21"/>
  </g>
  <text x="68" y="252" fill="#ffffff" font-size="16" font-weight="700">Principal</text>
  <text x="68" y="268" fill="#bfdbfe" font-size="11">Solicitante</text>

  <!-- ═══════════ ARROWS / CONNECTIONS ═══════════ -->

  <!-- Principal → GUARD (request) -->
  <line x1="170" y1="245" x2="376" y2="245" stroke="#67e8f9" stroke-width="2.2" stroke-dasharray="6 3" marker-end="url(#arrowCyan)"/>
  <rect x="230" y="222" width="80" height="22" rx="4" fill="#0e1629" stroke="#1e3a5f" stroke-width="0.8"/>
  <text x="270" y="237" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">request</text>

  <!-- Política → GUARD -->
  <line x1="480" y1="134" x2="480" y2="206" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowSlate)"/>
  <text x="494" y="172" fill="#94a3b8" font-size="10" font-style="italic">evalúa</text>

  <!-- GUARD → Recurso -->
  <line x1="580" y1="245" x2="636" y2="245" stroke="#67e8f9" stroke-width="2.2" marker-end="url(#arrowCyan)"/>

  <!-- GUARD → Log Audit -->
  <line x1="480" y1="280" x2="480" y2="336" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrowSlate)"/>
  <text x="494" y="312" fill="#94a3b8" font-size="10" font-style="italic">registra</text>

</svg>